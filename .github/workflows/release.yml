name: WomaPython Release Build

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:


  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-binutils

      - name: Install NSIS
        run: choco install nsis

      - name: Configure and Build
        shell: cmd
        run: |
          call PCbuild\build.bat -e -p x64 "/p:PlatformToolset=v143"

      - name: Package Release
        shell: cmd
        run: |
          mkdir release-woma
          xcopy PCbuild\amd64\woma*.exe release-woma\ /Y
          xcopy PCbuild\amd64\python*.dll release-woma\ /Y
          xcopy PCbuild\amd64\vcruntime*.dll release-woma\ /Y
          xcopy llama.cpp\build\bin\Release\*.dll release-woma\ /Y
          makensis woma_installer.nsi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woma-windows
          path: woma-windows-x86_64-installer.exe

  create-release:
    name: Create Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.12.13
          name: WomaPython 3.12.13
          draft: false
          prerelease: false
          files: |
            artifacts/woma-windows/woma-windows-x86_64-installer.exe
