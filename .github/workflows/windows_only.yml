name: WomaPython Windows Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build CPython
        run: |
          .\PCbuild\build.bat -e -c Release -p x64
        shell: cmd

      - name: Package Release
        run: |
          mkdir release-woma
          Copy-Item PCbuild\amd64\woma.exe release-woma\
          Copy-Item PCbuild\amd64\*.dll release-woma\
          Copy-Item PCbuild\amd64\*.pyd release-woma\
          Copy-Item -Recurse Lib release-woma\
          Copy-Item -Recurse Include release-woma\
        shell: powershell

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS Installer
        run: makensis woma_installer.nsi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woma-windows
          path: woma-windows-x86_64-installer.exe

  create-release:
    name: Attach to Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.12.13
          name: WomaPython 3.12.13
          draft: false
          prerelease: false
          files: |
            artifacts/woma-windows/woma-windows-x86_64-installer.exe
