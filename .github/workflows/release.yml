name: WomaPython Release Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo bash ./.github/workflows/posix-deps-apt.sh
          sudo apt-get install -y cmake curl gcc g++ make

      - name: Configure and Build
        run: |
          chmod +x configure config.status config.guess config.sub install-sh
          ./configure
          make -j$(nproc)

      - name: Package Release
        run: |
          mkdir -p release-woma
          make install DESTDIR=$(pwd)/release-woma
          tar -czvf woma-linux-x86_64.tar.gz -C release-woma .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woma-linux
          path: woma-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-binutils

      - name: Forge MSVC Object File
        shell: msys2 {0}
        run: |
          mkdir -p PCbuild/amd64
          objcopy -I binary -O pe-x86-64 -B i386:x86-64 model.gguf PCbuild/amd64/model.obj

      - name: Configure and Build
        shell: cmd
        run: |
          call PCbuild\build.bat -e -p x64

      - name: Package Release
        shell: cmd
        run: |
          mkdir release-woma
          xcopy PCbuild\amd64\woma*.exe release-woma\ /Y
          xcopy PCbuild\amd64\python*.dll release-woma\ /Y
          xcopy PCbuild\amd64\vcruntime*.dll release-woma\ /Y
          powershell Compress-Archive -Path "release-woma\*" -DestinationPath "woma-windows-x86_64.zip"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: woma-windows
          path: woma-windows-x86_64.zip
